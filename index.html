<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tour 360 - Tipon</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    #viewerWrap {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    #panorama {
      width: 100%;
      height: 100%;
    }

    /* PANEL */
    #overlayPanel {
      position: absolute;
      top: 18px;
      left: 18px;
      width: 340px;
      max-height: calc(100vh - 36px);
      background: rgba(18,30,34,0.82);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      padding-bottom: 12px;
      z-index: 20;
    }

    #panelHeader {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #projectTitle {
      margin: 0;
      font-size: 18px;
      font-weight: bold;
    }

    #projectSubtitle {
      margin: 4px 0 0;
      font-size: 12px;
      opacity: 0.8;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
    }

    #menuContent {
      padding: 0 12px;
    }

    /* DROPDOWN */
    .menu-dropdown-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .menu-dropdown-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chevron {
      transition: transform 0.2s;
    }

    .chevron.rotated {
      transform: rotate(180deg);
    }

    /* LISTA */
    .lugares-list {
      max-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.3s;
      opacity: 0;
    }

    .lugares-list.open {
      max-height: 500px;
      opacity: 1;
      margin-top: 10px;
    }

    .lugar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: white;
      cursor: pointer;
    }

    .lugar-item:hover {
      background: rgba(255,255,255,0.12);
    }

    .lugar-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #00bcd4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* SCENE PANEL */
    #scenePanel {
      margin-top: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
    }

    .ctrl-btn {
      border: none;
      padding: 8px;
      margin: 4px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
    }

    /* MODAL */
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .info-card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 16px;
      width: 300px;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    /* 🎯 PUNTERO */
    #centerPointer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      pointer-events: none;
    }

    .pointer-ring {
      width: 20px;
      height: 20px;
      border: 2px solid white;
      border-radius: 50%;
    }

    .pointer-dot {
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #centerPointer.active .pointer-ring {
      border-color: #00e5ff;
      transform: scale(1.2);
    }

    #centerPointer.active .pointer-dot {
      background: #00e5ff;
    }

  </style>

  <!-- IMPORTMAP -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
 
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
    }
  }
  </script>

</head>

<body>

<div id="viewerWrap">

  <div id="panorama"></div>

  <!-- 🎯 PUNTERO -->
  <div id="centerPointer">
    <div class="pointer-ring"></div>
    <div class="pointer-dot"></div>
  </div>

  <!-- PANEL -->
  <div id="overlayPanel">

    <div id="panelHeader">
      <div>
        <h1 id="projectTitle">Cargando...</h1>
        <p id="projectSubtitle">Tour VR</p>
      </div>
      <button id="togglePanelBtn" class="icon-btn">☰</button>
    </div>

    <div id="menuContent">

      <!-- LUGARES -->
      <button id="lugaresToggleBtn" class="menu-dropdown-btn">
        <div class="menu-dropdown-left">
          <div class="menu-badge">📍</div>
          Lugares
        </div>
        <div id="lugaresChevron" class="chevron">▼</div>
      </button>

      <div id="lugaresList" class="lugares-list">

        <button class="lugar-item" data-zona="zona1">
          <div class="lugar-icon">1</div>
          Ingreso
        </button>

        <button class="lugar-item" data-zona="zona2">
          <div class="lugar-icon">2</div>
          Andenes
        </button>

        <button class="lugar-item" data-zona="zona3">
          <div class="lugar-icon">3</div>
          Canales
        </button>

        <button class="lugar-item" data-zona="zona1">
          <div class="lugar-icon">4</div>
          Vista Alta
        </button>

        <button class="lugar-item" data-zona="zona2">
          <div class="lugar-icon">5</div>
          Lateral
        </button>

        <button class="lugar-item" data-zona="zona3">
          <div class="lugar-icon">6</div>
          Ceremonial
        </button>

        <button class="lugar-item" data-zona="zona1">
          <div class="lugar-icon">7</div>
          Panorámica
        </button>

      </div>

      <!-- CONTROLES -->
      <div id="scenePanel">
        <p id="sceneTitle">Sin escena</p>
        <p id="sceneInfo">Selecciona una zona</p>

        <button class="ctrl-btn" id="prevBtn">Anterior</button>
        <button class="ctrl-btn" id="nextBtn">Siguiente</button>
        <button class="ctrl-btn" id="fullscreenBtn">Pantalla</button>
        <button class="ctrl-btn" id="infoBtn">Info</button>
        <button class="ctrl-btn" id="gyroBtn">Giroscopio</button>
        
      </div>

    </div>
  </div>

  <!-- MODAL -->
  <div id="infoModalOverlay" class="modal-overlay hidden">
    <div class="info-card">
      <button id="closeInfoBtn">X</button>
      <h2 id="infoCardTitle"></h2>
      <p id="infoCardContent"></p>
    </div>
  </div>

</div>

<script type="module" src="./app.js"></script>

</body>
</html>
